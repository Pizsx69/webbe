<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termékrendelés</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <style>
        body {
            /* 1. CSERÉLD KI A HÁTTÉRSZÍNT A FELADAT ALAPJÁN! */
            background-color: rgb(228, 185, 91); 
            font-family: sans-serif;
        }
        /* Kártya stílusú háttér az űrlapnak a jobb olvashatóságért */
        .order-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Reszponzív, szép lekerekített kép */
        .product-img {
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 400px;
            width: 100%;
        }
    </style>
    <script>
        function ellenoriz() {
            var rendben = true;

            // 2. MEZŐK BEKÉRÉSE (Ha kell még mező, másold le az egyik sort)
            var nev = document.getElementById('nev'); // Pl. nev
            var email = document.getElementById('email'); // Pl. email
            var darab = document.getElementById('darab'); // Pl. darab vagy nap
            var nap = document.getElementById('nap'); // Pl. legördülő

            // Alap háttérszín visszaállítása
            nev.style.backgroundColor = "";
            email.style.backgroundColor = "";
            darab.style.backgroundColor = "";
            nap.style.backgroundColor = "";

            // A) KÖTELEZŐ MEZŐ ÉS HOSSZ VIZSGÁLAT (Pl. Név: min 8, max 30)
            if (nev.value.trim() === "" || nev.value.length < 8 || nev.value.length > 30) {
                nev.style.backgroundColor = "#f99";
                rendben = false;
            }

            // B) E-MAIL VIZSGÁLAT (Ez a regex fixen ez a ZH-kban)
            var checkPattern = /^([A-Za-z0-9_\-\.])+\@([A-Za-z0-9_\-\.])+\.([A-Za-z]{2,4})$/;
            if (email.value.trim() === "" || !checkPattern.test(email.value)) {
                email.style.backgroundColor = "#f99";
                rendben = false;
            }

            // C) SZÁM VIZSGÁLAT (Pl. Darab: min 1, max 10 vagy 20)
            // CSERÉLD A MIN ÉS MAX ÉRTÉKEKET A ZH ALAPJÁN!
            var szamertek = parseInt(darab.value);
            if (darab.value.trim() === "" || isNaN(szamertek) || szamertek < 1 || szamertek > 10 || !/^\d+$/.test(darab.value)) {
                darab.style.backgroundColor = "#f99";
                rendben = false;
            }

            // D) LEGÖRDÜLŐ VIZSGÁLAT (Mik az opciók?)
            // ÍRD ÁT A TÖMBÖT A ZH-BAN KÉRT SZAVAKRA! (pl. "hétfő", "kedd" VAGY "Ford", "Suzuki")
            var opciok = ["Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek"];
            if (nap.value.trim() === "" || !opciok.includes(nap.value)) {
                nap.style.backgroundColor = "#f99";
                rendben = false;
            }

            return rendben;
        }
    </script>
</head>
<body>
    <div class="bg-dark text-white py-2 mb-4">
        <div class="container text-right">
            <small class="font-weight-bold">Név: Kovács Márk István | Neptun kód: EBOJED</small>
        </div>
    </div>

    <div class="container my-5">
        <div class="text-center mb-5 text-dark">
            <h1 class="display-4 font-weight-bold">Termékrendelés</h1>
            <h3 class="text-muted">Termék-Laptop01</h3>
        </div>

        <div class="row align-items-center">
            
            <div class="col-lg-6 mb-4">
                <div class="order-card p-4 p-sm-5">
                    <form action="feldolgoz.php" method="POST" onsubmit="return ellenoriz();">
                        
                        <div class="form-group">
                            <label for="nev" class="font-weight-bold">Név:</label>
                            <input type="text" id="nev" name="nev" class="form-control" placeholder="Teljes név">
                        </div>

                        <div class="form-group">
                            <label for="email" class="font-weight-bold">E-mail:</label>
                            <input type="text" id="email" name="email" class="form-control" placeholder="pelda@email.com">
                        </div>

                        <div class="form-group">
                            <label for="darab" class="font-weight-bold">Darab:</label>
                            <input type="text" id="darab" name="darab" class="form-control" placeholder="Mennyiség">
                        </div>

                        <div class="form-group mb-4">
                            <label for="nap" class="font-weight-bold">Nap:</label>
                            <select id="nap" name="nap" class="form-control">
                                <option value="">Válasszon!</option>
                                <option value="Hétfő">Hétfő</option>
                                <option value="Kedd">Kedd</option>
                                <option value="Szerda">Szerda</option>
                                <option value="Csütörtök">Csütörtök</option>
                                <option value="Péntek">Péntek</option>
                            </select>
                        </div>

                        <input type="submit" value="Küldés" class="btn btn-primary btn-block btn-lg font-weight-bold shadow-sm">
                    </form>
                </div>
            </div>

            <div class="col-lg-6 mb-4 text-center">
                <img src="laptop.jpg" width="800px" alt="Kép" class="product-imgimg-fluid">
            </div>

        </div>
    </div>
</body>
</html>
